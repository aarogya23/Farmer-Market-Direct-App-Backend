spring.application.name=FarmerDirectMarkert

server.port=8082
 
# ===========================
# MySQL Database
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/farmer_direct_market?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
 
# ===========================
# JWT
# ===========================
app.jwt.secret=4d6a5a7a8f3b2e1c9d0f7a6b5c4e3d2a1f0e9d8c7b6a5f4e3d2c1b0a9f8e7d6c
app.jwt.expiration-ms=86400000

# ===========================
# Google OAuth2
# ===========================
# Get these from Google Cloud Console: https://console.cloud.google.com/
spring.security.oauth2.client.registration.google.client-id=**************************.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=******************************
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.registration.google.redirect-uri=//based on the code

# Frontend redirect after successful OAuth
app.oauth.frontend-redirect-uri=farmermarketdirectapp://oauth-callback

# ===========================
# Multipart Configuration
# ===========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


